name: Deploy to HF Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # TODO: set these to your Space, e.g. HF_USERNAME=alice HF_SPACE=knowledge-hub
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          # Push a clean single-commit snapshot of the current tree, not the full
          # GitHub history. HF Spaces rejects binary blobs that aren't in Xet/LFS,
          # and old commits can carry such blobs even after they're deleted at the
          # tip — an orphan commit sends only the files that exist now.
          git config user.email "deploy@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan hf-deploy
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            hf-deploy:main
